<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <title>Barbershop or something</title>
</head>
<body>
<center>
    <iframe id="video" height="560" width="315" frameborder="0"></iframe>
    <br>
    <label for="lemon_squeezy">Lemon Squeezy</label>
    <input type="checkbox" name="Lemon Squeezy" id="lemon_squeezy" checked/>
    <label for="three_and_a_half_men">Three and a Half Men</label>
    <input type="checkbox" id="three_and_a_half_men" checked/>
    <label for="midtown">Midtown</label>
    <input type="checkbox" id="midtown" checked/>
    <label for="quorum">Quorum</label>
    <input type="checkbox" id="quorum" checked/>
    <label for="ringmasters">Ringmasters</label>
    <input type="checkbox" id="ringmasters" checked/>
    <label for="first_take">First Take</label>
    <input type="checkbox" id="first_take" checked/>
    <br>
    <label for="shorts">Shorts Only?</label>
    <input type="checkbox" id="shorts" checked/>
    <input type="button" value="Generate" id="generate"/>
</center>
<script type="module">
    import init, { barbershop_gen } from "./pkg/barbershop.js";

    init().then(() => {
        document.getElementById("generate").onclick = function() {var quartet_list = [document.getElementById("lemon_squeezy").checked,document.getElementById("three_and_a_half_men").checked,document.getElementById("midtown").checked,document.getElementById("quorum").checked,document.getElementById("ringmasters").checked,document.getElementById("first_take").checked];
            var bsg = barbershop_gen(quartet_list,document.getElementById("shorts").checked);
            document.getElementById("video").src = "https://www.youtube.com/embed/"+bsg+"?autoplay=1&modestbranding=1&rel=0&showinfo=0&controls=0&disablekb=1&fs=0&iv_load_policy=3&cc_load_policy=0&start=0&end=0&origin=https://www.youtube.com";}
        var quartet_list = [document.getElementById("lemon_squeezy").checked,document.getElementById("three_and_a_half_men").checked,document.getElementById("midtown").checked,document.getElementById("quorum").checked,document.getElementById("ringmasters").checked,document.getElementById("first_take").checked];
        var bsg = barbershop_gen(quartet_list,document.getElementById("shorts").checked);
        document.getElementById("video").src = "https://www.youtube.com/embed/"+bsg+"?autoplay=1&modestbranding=1&rel=0&showinfo=0&controls=0&disablekb=1&fs=0&iv_load_policy=3&cc_load_policy=0&start=0&end=0&origin=https://www.youtube.com&loop=1";

    });
</script>
</body>
</html>
